<div class="events-list" *ngIf="events.length > 0; else emptyState">
  <ion-item-sliding *ngFor="let event of events; trackBy: trackByEventId" class="event-row">
    <ion-item lines="none">
      <span class="event-icon">{{ iconFor(event.type) }}</span>
      <div class="event-copy">
        <strong>{{ titleFor(event) }}</strong>
        <small>{{ event.teamLabel }} <span *ngIf="event.persisted">- Guardado</span><span *ngIf="!event.persisted">- Pendiente</span></small>
      </div>
    </ion-item>

    <ion-item-options side="start">
      <ion-item-option color="medium" (click)="editEvent.emit(event.id)">Editar</ion-item-option>
    </ion-item-options>

    <ion-item-options side="end">
      <ion-item-option color="danger" (click)="removeEvent.emit(event.id)">Eliminar</ion-item-option>
    </ion-item-options>
  </ion-item-sliding>
</div>

<ng-template #emptyState>
  <div class="events-empty">No hay eventos aun. Agrega el primero.</div>
</ng-template>

<div class="events-add" (click)="addEvent.emit()">+ Agregar evento</div>
